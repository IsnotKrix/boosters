# Builds both loader ports and publishes them together as a single GitHub
# Release whenever a version tag (e.g. v1.3.0) is pushed - so it's not
# possible to ship one loader's jar without the other going through the
# same step.

name: release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-fabric:
    name: build (Fabric)
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture jar
        uses: actions/upload-artifact@v7
        with:
          name: fabric-jar
          # exclude the sources jar - it isn't a release asset
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar

  build-neoforge:
    name: build (NeoForge)
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        working-directory: neoforge
        run: chmod +x ./gradlew
      - name: build
        working-directory: neoforge
        run: ./gradlew build
      - name: capture jar
        uses: actions/upload-artifact@v7
        with:
          name: neoforge-jar
          path: neoforge/build/libs/*.jar

  release:
    name: publish release
    needs: [build-fabric, build-neoforge]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download fabric jar
        uses: actions/download-artifact@v6
        with:
          name: fabric-jar
          path: dist/fabric
      - name: download neoforge jar
        uses: actions/download-artifact@v6
        with:
          name: neoforge-jar
          path: dist/neoforge
      - name: rename jars to avoid filename collision
        run: |
          mkdir -p dist/release
          mv dist/fabric/*.jar "dist/release/boosters-${{ github.ref_name }}-fabric.jar"
          mv dist/neoforge/*.jar "dist/release/boosters-${{ github.ref_name }}-neoforge.jar"
      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/release/*.jar \
            --repo "${{ github.repository }}" \
            --title "Boosters ${{ github.ref_name }}" \
            --generate-notes
