license="${mod_license}"

issueTrackerURL="https://github.com/IsnotKrix/boosters/issues"

[[mods]] #mandatory

modId="${mod_id}" #mandatory

version="${mod_version}" #mandatory

displayName="${mod_name}" #mandatory

displayURL="https://www.curseforge.com/minecraft/mc-mods/boosters"

logoFile="boosters.png"

authors="Kirxishere"

description='''
Throttles distant mob AI, item/XP orb ticking, and block entities, and adds extra distance-based culling for entities and particles on top of what vanilla already does. Most noticeable in farms, bases, and other high-entity-density areas; doesn't replace your chunk renderer (pair with Embeddium for that). Compatible with EntityCulling.
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="${mod_id}.client.mixins.json"

[[dependencies.${mod_id}]] #optional
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="[${neo_version},)" #mandatory
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="cloth_config"
    type="required"
    versionRange="[${cloth_config_version},)"
    ordering="NONE"
    side="CLIENT"
